services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rezeki1/ig-scraper-backend:latest
    container_name: ig-scraper-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/session:/app/session
    restart: unless-stopped
    networks:
      - ig-scraper-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rezeki1/ig-scraper-frontend:latest
    container_name: ig-scraper-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Untuk browser user (akses dari luar Docker)
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Untuk server-side Next.js (akses antar container)
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ig-scraper-net

networks:
  ig-scraper-net:
    driver: bridge